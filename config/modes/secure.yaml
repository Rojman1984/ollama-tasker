# Ollama Tasker -- SECURE mode defaults
# SDD Sections 5.1 and 11
# ANY cloud call raises TaskerPolicyError immediately -- no silent fallback.
name: secure
orchestrator_tier_max: 1
routing_policy: private
interaction_pattern: sync_stream
memory_scope: local_filesystem
private_hard_block: true
privacy_tier: local_only
tool_bundle:
  - file_read
  - file_write
  - local_search
  - local_memory
