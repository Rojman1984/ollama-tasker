# Ollama Tasker -- Worker Registry
# Only tool-capable models (Capability.TOOL_USE) are registered.
# See SDD Section 8.3.

workers:
  - id: lfm2.5-local
    provider: ollama
    model_id: "lfm2.5-thinking:latest"
    compute_location: local
    capabilities: [tool_use, code, search]
    tool_protocol: lfm25             # was: native (incorrect -- Ollama reports
                                      # capability: completion for this model
                                      # family and rejects tools[]; see
                                      # SDD_ADDENDUM_7.5.md A.2b)
    tool_result_role: tool           # test first; fall back to "user" if
                                      # Ollama rejects the "tool" role
    context_window: 128000
    cost_input: 0.0
    cost_output: 0.0
    ollama_usage_level: null
    latency_class: medium
    requires_gpu: false

  - id: nemotron-3-ultra-cloud
    provider: ollama
    model_id: "nemotron-3-ultra"
    compute_location: ollama_cloud
    capabilities: [tool_use, reasoning, thinking, code]
    tool_protocol: native
    context_window: 128000
    cost_input: 0.0
    cost_output: 0.0
    ollama_usage_level: 3
    latency_class: slow
    requires_gpu: false

